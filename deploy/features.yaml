features:
  emailChange:
    enabled: true
    config:
      requirePasswordVerification: true

  phoneChange:
    enabled: false
    config:
      requirePasswordVerification: true

  usernameChange:
    enabled: false
    config:
      requirePasswordVerification: true

  mfa:
    totp:
      enabled: true
    backupCodes:
      enabled: true
    webAuthn:
      enabled: true

  passkey:
    enabled: true

  socialIdentities:
    enabled: true
    config:
      # 说明：connectors 支持按配置扩展，不限制为示例里的平台。
      # 只要在 Logto 中创建了对应 social connector，并把 connectorId 填在这里即可。
      # target 建议与 Logto connector 的 target 保持一致（如 google/github/qq/wechat/discord/...）。
      connectors:
        - target: google
          connectorId: logto_google_connector_id
          enabled: true
          displayName: Google
          icon: google
          description: Google
        - target: github
          connectorId: logto_github_connector_id
          enabled: false
          displayName: GitHub
          icon: github
          description: GitHub
        # - target: apple
        #   connectorId: logto_apple_connector_id
        #   enabled: false
        #   displayName: Apple
        #   icon: apple
        #   description: Apple
        #
        - target: discord
          connectorId: 9f2n8c8uofrqb7c4dxnmc
          enabled: true
          displayName: Discord
          icon: discord
          description: Discord

  sessions:
    enabled: true

  accountDeletion:
    enabled: false
    config:
      requirePasswordConfirmation: true
      requireConfirmationText: true

profileFields:
  avatar:
    enabled: true
    label: Profile picture
    description: Choose your profile image
    placeholder: https://example.com/avatar.jpg
    inputType: url

  name:
    enabled: true
    label: Display name
    description: You can change it later
    placeholder: John
    inputType: text
    required: true

  birthdate:
    enabled: true
    label: Birthday
    description: Your birthday and age
    inputType: date

  zoneinfo:
    enabled: false
    label: 时区
    description: 您所在的时区
    placeholder: Asia/Shanghai
    inputType: text

  locale:
    enabled: true
    label: Language
    description: Your language
    placeholder: en-US
    inputType: text

  website:
    enabled: false
    label: Website
    description: 您的个人主页链接
    placeholder: https://example.com
    inputType: url
